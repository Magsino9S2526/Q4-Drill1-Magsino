<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Q4 Drill 1</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container text-center mt-5">

    <h1 class="text-primary">Electricity Consumption Classifier</h1>
    <p>Enter your electricity usage (kWh) to know your category.</p>

    <!-- Input Form -->
    <div class="mb-3">
        <input type="number" id="usageInput" class="form-control w-50 mx-auto" placeholder="Enter kWh">
    </div>
    <button class="btn btn-success" onclick="classifyUsage()">Check Category</button>

    <!-- Output Section -->
    <h2 class="mt-4">Result:</h2>
    <p id="result" class="fw-bold"></p>

    </p>

    <script src="main.js"></script>
</body>
</html>
